# File:    infra/docker-compose.prod.yml
# Purpose: Production stack for a single VPS (Hetzner / DigitalOcean).
# Owner:   Navanish (Phase 5)
#
# Run on the VPS:
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod pull
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d
#
# The first command pulls images that CI built and pushed to GHCR.
# The second brings them up. No `docker build` happens on the VPS — that's CI's job.
#
# What lives where:
#   - Postgres + pgvector → Supabase (managed). NOT in this compose.
#   - Redis              → in this compose (rate-limit cache + Celery broker).
#   - Backend / AI svc /
#     frontend / celery
#     worker + beat /
#     nginx              → in this compose.
#   - Media files        → `media_data` named volume; back this up.
#
# Public ports:
#   nginx :80  → 301 redirect to https
#   nginx :443 → TLS termination; proxies / → frontend, /api → backend.
#
# Image tags come from .env.prod (defaults to `latest` so a `compose pull`
# always grabs the newest CI-pushed build).

services:
  redis:
    image: redis:7-alpine
    container_name: skillship-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - skillship_internal

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/amfire-tech/skillship-backend:latest}
    container_name: skillship-backend
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.prod}
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - skillship_internal
    expose:
      - "8000"

  celery-worker:
    image: ${BACKEND_IMAGE:-ghcr.io/amfire-tech/skillship-backend:latest}
    container_name: skillship-celery-worker
    restart: unless-stopped
    command: ["celery", "-A", "jobs.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    env_file: ${ENV_FILE:-.env.prod}
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    networks:
      - skillship_internal

  celery-beat:
    # Scheduler: fires the periodic tasks seeded by analytics/migrations 0002 + 0003.
    # Runs as a single replica — never scale this service.
    image: ${BACKEND_IMAGE:-ghcr.io/amfire-tech/skillship-backend:latest}
    container_name: skillship-celery-beat
    restart: unless-stopped
    command: ["celery", "-A", "jobs.celery_app", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    env_file: ${ENV_FILE:-.env.prod}
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - skillship_internal

  ai-service:
    image: ${AI_SERVICE_IMAGE:-ghcr.io/amfire-tech/skillship-ai-service:latest}
    container_name: skillship-ai-service
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.prod}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - skillship_internal
    expose:
      - "8001"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/amfire-tech/skillship-frontend:latest}
    container_name: skillship-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # NEXT_PUBLIC_API_BASE_URL is inlined at BUILD time (see frontend/Dockerfile
      # ARG + .github/workflows/deploy.yml). Setting it here would be a no-op.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - skillship_internal
    expose:
      - "3000"

  nginx:
    # The only container that listens on the public network.
    image: nginx:1.27-alpine
    container_name: skillship-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - skillship_internal
      - skillship_public

  certbot:
    # One-shot. First cert (per VPS):
    #   docker compose -f infra/docker-compose.prod.yml run --rm certbot \
    #     certonly --webroot -w /var/www/certbot \
    #     -d skillship.example.com -d www.skillship.example.com \
    #     --email contact@amfire.in --agree-tos --no-eff-email
    # Renewal (cron it daily on host):
    #   docker compose -f infra/docker-compose.prod.yml run --rm certbot renew
    image: certbot/certbot:latest
    container_name: skillship-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - skillship_internal

volumes:
  redis_data:
  media_data:
  certbot_www:
  certbot_certs:

networks:
  skillship_internal:
    driver: bridge
  skillship_public:
    driver: bridge
