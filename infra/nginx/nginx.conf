# File:    infra/nginx/nginx.conf
# Purpose: Reverse proxy + TLS termination for the production stack.
# Owner:   Navanish (Phase 5)
#
# Replace `skillship.example.com` everywhere below with your real domain
# before first deploy. Issue the cert with the certbot service in
# docker-compose.prod.yml — see comments there.
#
# Traffic shape:
#   :80  → 301 redirect to https (+ ACME challenge passthrough for renewals)
#   :443 → TLS termination
#          /healthz/         → backend (for uptime monitors)
#          /api/             → Django on :8000
#          /admin/           → Django admin
#          /static/, /media/ → backend (whitenoise / FileSystemStorage)
#          /                 → Next.js frontend on :3000
#
# Internal services (ai-service on :8001) are NOT proxied here. They speak
# only to the Django backend over the docker network, behind X-Internal-Key.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    # 10 MB uploads — matches the AI bridge PDF limit + leaves headroom for CSVs.
    client_max_body_size 10M;

    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Upstream backends (compose service names) ───────────────────────────
    upstream backend  { server backend:8000;  keepalive 16; }
    upstream frontend { server frontend:3000; keepalive 16; }

    # ── :80 — ACME challenge passthrough + permanent HTTPS redirect ─────────
    server {
        listen      80;
        listen [::]:80;
        server_name skillship.example.com www.skillship.example.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── :443 — TLS, the actual app ──────────────────────────────────────────
    server {
        listen      443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name skillship.example.com www.skillship.example.com;

        ssl_certificate     /etc/letsencrypt/live/skillship.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skillship.example.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SkillshipTLS:10m;

        # Modern security headers. CSP is intentionally permissive for now —
        # tighten once frontend asset origins are known.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options          "DENY" always;
        add_header X-Content-Type-Options   "nosniff" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

        # Healthcheck for uptime monitors.
        location = /healthz/ {
            proxy_pass http://backend/healthz/;
            access_log off;
        }

        # Django admin + DRF surface.
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # Long AI calls can take ~30s. Give nginx headroom.
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /admin/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Static + media served by Django (whitenoise + FileSystemStorage).
        # Swap for S3/CDN later.
        location /static/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            expires 7d;
        }
        location /media/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            expires 1d;
        }

        # Everything else → Next.js. Upgrade headers stay set for future WS.
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
